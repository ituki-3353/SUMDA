<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMA - ユーザー登録</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../assets/config.js"></script>
</head>
<body class="login-page">
    <main class="login-wrapper">
        <div class="login-logo-area">
            <img src="../assets/logo.png" alt="SUMA Logo" class="center-logo">
        </div>

        <div class="login-box">
            <h2>新規アカウント作成</h2>
            <p class="subtitle">SUMA管理システムへようこそ。</p>
            
            <div class="login-form">
                <input type="text" id="reg-username" placeholder="ユーザー名" required>
                <input type="password" id="reg-password" placeholder="パスワード" required>
                <input type="password" id="reg-password-confirm" placeholder="パスワード（確認）" required>
                
                <button onclick="handleRegister()" id="reg-button">アカウントを作成</button>
            </div>

            <div class="login-footer">
                <div class="divider">または</div>
                <a href="../login.html" class="btn-create-account">サインインに戻る</a>
            </div>
        </div>
    </main>

<script src="../js/regist.js"></script>
</body>
</html>
