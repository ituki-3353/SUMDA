<div class="dash-container">
    <div class="dash-grid">
        <div class="tile tile-blue">
            <div class="tile-icon">👤</div>
            <div class="tile-body">
                <span class="tile-label">現在ログイン中</span>
                <div class="tile-value" id="dash-user-name">読み込み中...</div>
            </div>
        </div>

        <div class="tile tile-green">
            <div class="tile-icon">📊</div>
            <div class="tile-body">
                <span class="tile-label">DB登録ユーザー数</span>
                <div class="tile-value"><span id="dash-user-count">--</span> <small>名</small></div>
            </div>
        </div>

        <div class="tile tile-purple">
            <div class="tile-icon">🕒</div>
            <div class="tile-body">
                <span class="tile-label">取得サーバー時刻(UTC時刻)</span>
                <div class="tile-value" id="dash-server-time">--:--</div>
            </div>
        </div>

        <div class="tile tile-orange">
            <div class="tile-icon">🌐</div>
            <div class="tile-body">
                <span class="tile-label">接続ステータス</span>
                <div class="tile-value status-online">Online</div>
                <small>ituki-server / Tailscale</small>
            </div>
        </div>
    </div>
</div>    


<style>
    .dash-container { padding: 20px; }
    
    /* タイルを並べるグリッド設定 */
    .dash-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
    }

    /* タイルの共通デザイン */
    .tile {
        background: white;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        align-items: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        border: 1px solid #e1e4e8;
        transition: transform 0.2s;
    }
    .tile:hover { transform: translateY(-3px); }

    .tile-icon {
        font-size: 32px;
        margin-right: 20px;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
    }

    /* タイルの色バリエーション */
    .tile-blue .tile-icon { background: #e7f3ff; }
    .tile-green .tile-icon { background: #dafbe1; }
    .tile-purple .tile-icon { background: #f2edff; }
    .tile-orange .tile-icon { background: #fff5e9; }

    .tile-body { display: flex; flex-direction: column; }
    .tile-label { font-size: 14px; color: #57606a; margin-bottom: 4px; }
    .tile-value { font-size: 20px; font-weight: bold; color: #24292f; }
    
    .status-online { color: #2da44e; }
</style>

<script>
    // 即時実行関数でユーザー名を反映
    (function() {
        const name = localStorage.getItem('loginUser') || '不明';
        const isAdmin = localStorage.getItem('isAdmin') === '1';
        const el = document.getElementById('dash-user-name');
        if (el) el.innerText = isAdmin ? `${name} (管理者)` : name;
    })();
</script>

<style>
    /* このページ専用のスタイルを少しだけ定義 */
    .dashboard-content { padding: 20px; }
    .status-cards { display: flex; gap: 20px; margin-top: 20px; }
    .card { 
        flex: 1; 
        padding: 20px; 
        border: 1px solid #d1d5db; 
        border-radius: 8px; 
        background: #f9fafb;
    }
</style>
